# Create a new user
mutation CreateUser($googleId: String!, $displayName: String!) @auth(level: PUBLIC) {
  user_insert(
    data: {
      googleId: $googleId
      displayName: $displayName
      createdAt_expr: "request.time"
    }
  )
}

# Update an existing high score by its ID
mutation UpdateHighScore($id: UUID!, $score: Int!) @auth(level: PUBLIC) {
  highScore_update(
    id: $id
    data: {
      score: $score
      updatedAt_expr: "request.time"
    }
  )
}

# Create a new high score entry
mutation CreateHighScore($userId: UUID!, $score: Int!) @auth(level: PUBLIC) {
  highScore_insert(
    data: {
      userId: $userId
      score: $score
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

# Record a game session
mutation CreateGameSession($userId: UUID!, $score: Int!) @auth(level: PUBLIC) {
  gameSession_insert(
    data: {
      userId: $userId
      score: $score
      createdAt_expr: "request.time"
    }
  )
}
